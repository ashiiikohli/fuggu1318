<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mojopanda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
}

.slider{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

.slider img{
width:100%;
height:100%;
object-fit:cover;
transition:1s;
}

.top-icons{
position:absolute;
top:20px;
right:30px;
display:flex;
gap:25px;
z-index:1000;
}

.top-icons i{
font-size:28px;
color:#fff;
cursor:pointer;
transition:.3s;
}

.top-icons i:hover{
color:#ff5e7a;
transform:scale(1.2);
}



@media(max-width:768px){

.top-icons{
right:15px;
top:15px;
gap:18px;
}

.top-icons i{
font-size:22px;
}

}

/* ================= NEW ARRIVAL ================= */

.new-arrival{
    background:#fff;
    padding:60px 0;
    overflow:hidden;
}

.new-arrival h2{
    text-align:center;
    font-size:36px;
    margin-bottom:35px;
    letter-spacing:2px;
}

.arrival-slider{
    display:flex;
    gap:25px;
    width:max-content;
    animation:move 25s linear infinite;
}

.arrival-slider:hover{
    animation-play-state:paused;
}

.product{
    flex:0 0 auto;
    text-align:center;
}

.product img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #000;
    transition:.4s;
    cursor:pointer;
}

.product img:hover{
    transform:scale(1.15);
    border-color:#d4af37;
}

.product p{
    margin-top:10px;
    font-size:14px;
    font-weight:bold;
    color:#000;
}

@keyframes move{
    from{
        transform:translateX(100%);
    }
    to{
        transform:translateX(-100%);
    }
}

@media(max-width:768px){

.product img{
width:85px;
height:85px;
}

.new-arrival h2{
font-size:28px;
}

}

</style>
    
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="slider">

<img id="slide" src="banner1.jpg">

<div class="top-icons">
<i class="fa-solid fa-magnifying-glass"></i>
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-thumbs-down"></i>
</div>

</div>

<section class="new-arrival">

<h2>NEW ARRIVALS</h2>

<div class="arrival-slider">

<div class="product">
    <img src="product1.jpg" alt="">
    <p>Shirt</p>
</div>

<div class="product">
    <img src="product2.jpg" alt="">
    <p>Polo</p>
</div>

<div class="product">
    <img src="product3.jpg" alt="">
    <p>Denim</p>
</div>

<div class="product">
    <img src="product4.jpg" alt="">
    <p>Casual</p>
</div>

<div class="product">
    <img src="product5.jpg" alt="">
    <p>Hoodie</p>
</div>

<div class="product">
    <img src="product6.jpg" alt="">
    <p>Jacket</p>
</div>

<div class="product">
    <img src="product7.jpg" alt="">
    <p>Classic</p>
</div>

<div class="product">
    <img src="product8.jpg" alt="">
    <p>Premium</p>
</div>

<div class="product">
    <img src="product9.jpg" alt="">
    <p>Formal</p>
</div>

<div class="product">
    <img src="product10.jpg" alt="">
    <p>New</p>
    
</div>
    
</section>
  
<script>

const desktop=[
"banner1.jpg",
"banner2.jpg",
"banner3.jpg"
];

const mobile=[
"mobile1.jpg",
"mobile2.jpg",
"mobile3.jpg"
];

let i=0;

function changeImage(){

let images=window.innerWidth<=768?mobile:desktop;

document.getElementById("slide").src=images[i];

i++;

if(i>=images.length){
i=0;
}

}

changeImage();

setInterval(changeImage,4000);

</script>

</body>
</html>
