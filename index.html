<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
overflow:hidden;
background:#000;
}

.slider{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

.slider img{
width:100%;
height:100%;
object-fit:cover;
transition:1s;
}

.top-icons{
position:absolute;
top:20px;
right:30px;
display:flex;
gap:25px;
z-index:1000;
}

.top-icons i{
font-size:28px;
color:#fff;
cursor:pointer;
transition:.3s;
}

.top-icons i:hover{
color:#ff5e7a;
transform:scale(1.2);
}



@media(max-width:768px){

.top-icons{
right:15px;
top:15px;
gap:18px;
}

.top-icons i{
font-size:22px;
}

}

</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="slider">

<img id="slide" src="banner1.jpg">

<div class="top-icons">
<i class="fa-solid fa-magnifying-glass"></i>
<i class="fa-regular fa-heart"></i>
<i class="fa-regular fa-thumbs-down"></i>
</div>

</div>

<script>

const desktop=[
"banner1.jpg",
"banner2.jpg",
"banner3.jpg"
];

const mobile=[
"mobile1.jpg",
"mobile2.jpg",
"mobile3.jpg"
];

let i=0;

function changeImage(){

let images=window.innerWidth<=768?mobile:desktop;

document.getElementById("slide").src=images[i];

i++;

if(i>=images.length){
i=0;
}

}

changeImage();

setInterval(changeImage,4000);

</script>

</body>
</html>
